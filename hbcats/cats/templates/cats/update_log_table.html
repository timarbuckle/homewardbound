<div id="log-container" class="w-full">
    <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse" id="log-table">
            <thead class="bg-slate-50 border-b border-slate-200">
                <tr>
                    <th class="p-4 font-semibold text-slate-700 whitespace-nowrap">Last Updated</th>
                    <th class="p-4 font-semibold text-slate-700 whitespace-nowrap">Total Cats</th>
                    <th class="p-4 font-semibold text-slate-700 whitespace-nowrap">New Cats</th>
                    <th class="p-4 font-semibold text-slate-700 whitespace-nowrap">Adopted Cats</th>
                </tr>
            </thead>

            <tbody id="log-table-body" class="divide-y divide-slate-100">
                {% for log in logs %}
                <tr class="hover:bg-slate-50 transition">
                    <td class="p-4 whitespace-nowrap">
                        <span class="text-slate-600">{{ log.last_updated|date:"M d, Y g:i A" }}</span>
                    </td>
                    <td class="p-4 text-slate-600 text-sm whitespace-nowrap">
                        {{ log.total_cats }}
                    </td>
                    <td class="p-4 text-slate-500 font-mono text-sm whitespace-nowrap">
                        {{ log.new_cats }}
                    </td>
                    <td class="p-4 text-slate-500 font-mono text-sm whitespace-nowrap">
                        {{ log.adopted_cats }}
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="4" class="p-8 text-center text-slate-400">
                        No update logs found.
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
